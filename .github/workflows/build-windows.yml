name: Build Windows Installer

# Windows 설치 파일(.exe NSIS / .msi)을 GitHub의 Windows runner에서 빌드한다.
# - 수동 실행(Actions 탭 → Run workflow): 설치 파일이 artifact로 업로드되어 다운로드 가능
# - 태그 푸시(v로 시작, 예: v0.1.0): 위와 동일하게 빌드 + GitHub Release 초안 생성/첨부
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# 태그 푸시 시 Release를 생성하려면 쓰기 권한이 필요하다.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows installers)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 태그(v*) 푸시일 때만 Release를 만든다. 수동 실행이면 빈 값 → Release 생성 안 함.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "MAX Mind ${{ github.ref_name }}"
          releaseBody: "Windows 설치 파일입니다. `.exe`(NSIS) 또는 `.msi` 중 하나를 받아 설치하세요."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Upload installers as artifact
        uses: actions/upload-artifact@v4
        with:
          name: max-mind-windows-installers
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
