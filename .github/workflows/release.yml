name: Release

# 태그(v*) 푸시 또는 수동 실행 시 Windows·macOS 설치 파일을 빌드해
# 같은 GitHub Release에 업로드한다.
#   - Windows x64        : NSIS(.exe) + MSI(.msi)
#   - macOS Apple Silicon: .dmg (aarch64)
#   - macOS Intel        : .dmg (x86_64)
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-apple-silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 태그(v*) 푸시일 때만 Release에 업로드. 수동 실행이면 빌드만 하고 artifact로 받는다.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "MAX Mind ${{ github.ref_name }}"
          releaseBody: |
            사용 환경에 맞는 설치 파일을 받으세요. 다운로드 페이지에서도 받을 수 있습니다.

            | OS | 파일 |
            |----|------|
            | Windows 10/11 | `*_x64-setup.exe` (권장) 또는 `*_x64_en-US.msi` |
            | macOS (Apple Silicon · M1~) | `*_aarch64.dmg` |
            | macOS (Intel) | `*_x64.dmg` |

            > 설치 파일은 코드 서명이 적용되지 않아 첫 실행 시 OS 보안 경고가 표시될 수 있습니다.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload installers as artifact
        uses: actions/upload-artifact@v4
        with:
          name: max-mind-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
